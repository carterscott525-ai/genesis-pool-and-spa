  <style>
    .ty-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 120px 24px 80px;
      text-align: center;
      background: linear-gradient(160deg, #0D2A6B 0%, #1565C0 60%, #1976D2 100%);
    }
    .ty-card {
      background: #fff;
      border-radius: 24px;
      padding: 56px 48px;
      max-width: 560px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    }
    .ty-icon {
      width: 80px;
      height: 80px;
      background: #E8F5E9;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 28px;
    }
    .ty-icon svg { width: 40px; height: 40px; color: #2E7D32; }
    .ty-card h1 {
      font-size: 1.9rem;
      font-weight: 800;

      line-height: 1.7;

    }
    .ty-card p strong { color: #1E293B; }
    .ty-divider {
      border: none;
      border-top: 1px solid #E2E8F0;
      margin: 28px 0;
    }
    .ty-actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 28px;
    }
    .ty-actions .btn { justify-content: center; }
    .btn-ghost {
      background: #F0F4F8;
      color: #1565C0;
      font-family: 'Poppins', sans-serif;
      font-size: 1rem;
      font-weight: 600;
      padding: 14px 32px;
      border-radius: 50px;
      text-decoration: none;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.25s ease;
    }
    .btn-ghost:hover { background: #E3F2FD; }
    @media (max-width: 480px) {
      .ty-card { padding: 36px 24px; }
      .ty-card h1 { font-size: 1.5rem; }
